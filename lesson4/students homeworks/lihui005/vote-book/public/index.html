<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026.5月阅读书目投票活动</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="page-header">
        <div class="quote-panel">
          <p class="eyebrow">Reading Vote 2026</p>
          <h1 id="activityTitle">2026.5月阅读书目投票活动</h1>
          <p class="page-summary">每位登录用户最多可投 3 票。选择你最想推荐的书，实时查看排行榜和投票占比。</p>
          <blockquote>阅读让我们在有限的时间里，抵达更辽阔的世界。</blockquote>
        </div>

        <section class="auth-panel" aria-label="用户登录注册">
          <form class="auth-form" id="authForm">
            <label class="field">
              <span>用户名</span>
              <input id="username" name="username" type="text" autocomplete="username" placeholder="输入用户名">
            </label>
            <label class="field">
              <span>邮箱</span>
              <input id="email" name="email" type="email" autocomplete="email" placeholder="注册时必填，用于找回密码">
            </label>
            <label class="field auth-field-wide">
              <span>密码</span>
              <input id="password" name="password" type="password" autocomplete="current-password" placeholder="输入密码">
            </label>
            <div class="auth-actions">
              <button class="secondary-button" type="button" id="registerButton">注册</button>
              <button class="primary-button" type="submit" id="loginButton">登录</button>
            </div>
            <a class="forgot-link" href="#" id="forgotPasswordLink">忘记密码？</a>
          </form>

          <div class="user-card" id="userCard" hidden>
            <div>
              <span class="user-label">当前用户</span>
              <strong id="currentUsername"></strong>
              <span class="role-badge" id="currentRole"></span>
              <span class="user-email" id="currentEmail"></span>
              <span class="vote-quota" id="voteQuota"></span>
            </div>
            <button class="secondary-button" type="button" id="logoutButton">退出</button>
          </div>
        </section>
      </header>

      <section class="email-prompt-panel" id="emailPromptPanel" aria-label="补全邮箱" hidden>
        <div class="email-prompt-heading">
          <p class="eyebrow">Account</p>
          <h2>请补全邮箱</h2>
          <p>该账号尚未绑定邮箱。建议补全后即可使用「忘记密码」功能找回密码。</p>
        </div>
        <form class="email-prompt-form" id="emailPromptForm">
          <label class="field">
            <span>邮箱</span>
            <input id="emailPromptInput" name="email" type="email" autocomplete="email" placeholder="example@domain.com" required>
          </label>
          <div class="email-prompt-actions">
            <button class="secondary-button" type="button" id="emailPromptSkip">暂不补全</button>
            <button class="primary-button" type="submit" id="emailPromptSubmit">保存</button>
          </div>
        </form>
      </section>

      <section class="reset-panel" id="resetPasswordPanel" aria-label="重置密码" hidden>
        <div class="reset-heading">
          <p class="eyebrow">Reset</p>
          <h2>设置新密码</h2>
          <p>你正在通过密码重置链接进入。请设置新密码（至少 6 位）。</p>
        </div>
        <form class="reset-form" id="resetPasswordForm">
          <label class="field">
            <span>新密码</span>
            <input id="resetPasswordInput" name="password" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <label class="field">
            <span>确认新密码</span>
            <input id="resetPasswordConfirm" name="passwordConfirm" type="password" autocomplete="new-password" minlength="6" required>
          </label>
          <div class="reset-actions">
            <button class="secondary-button" type="button" id="resetCancelButton">取消</button>
            <button class="primary-button" type="submit" id="resetSubmitButton">提交新密码</button>
          </div>
        </form>
      </section>

      <section class="status-bar" id="status" role="status" aria-live="polite">正在加载图书...</section>

      <section class="leaderboard-panel" id="leaderboard" aria-label="排行榜 Top 3" aria-live="polite"></section>

      <section class="admin-panel" id="adminPanel" aria-label="管理员图书管理" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">Admin</p>
            <h2>图书管理</h2>
          </div>
          <p>调整候选图书的书名、作者、简介和封面地址。</p>
        </div>
        <form class="admin-config-bar" id="adminConfigForm">
          <label class="field admin-config-field">
            <span>活动标题</span>
            <input id="configTitleInput" name="title" type="text" placeholder="例如：2026.6月阅读书目投票活动">
          </label>
          <button class="secondary-button" type="submit">更新标题</button>
        </form>
        <div class="admin-toolbar">
          <button class="secondary-button" type="button" id="newBookToggle">+ 新建图书</button>
          <button class="danger-button" type="button" id="resetVotesButton">一键重置票数</button>
        </div>
        <form class="new-book-form" id="newBookForm" hidden>
          <p class="new-book-hint">填好书名和作者后点「自动抓取」，系统会从豆瓣自动抓取封面和简介。</p>
          <label class="field">
            <span>书名</span>
            <input id="newBookTitle" name="title" type="text" placeholder="例如：非暴力沟通" required>
          </label>
          <label class="field">
            <span>作者</span>
            <input id="newBookAuthor" name="author" type="text" placeholder="例如：马歇尔·卢森堡" required>
          </label>
          <label class="field new-book-field-wide">
            <span>简介</span>
            <textarea id="newBookDescription" name="description" rows="3" placeholder="自动抓取后会填入；也可手动编辑" required></textarea>
          </label>
          <div class="new-book-cover-row new-book-field-wide">
            <div class="new-book-cover-preview" aria-live="polite">
              <img id="newBookCoverPreview" alt="封面预览" hidden>
              <span id="newBookCoverPlaceholder" class="new-book-cover-placeholder">封面预览</span>
            </div>
            <div class="new-book-cover-meta">
              <input type="hidden" id="newBookCoverSource" name="coverSourceUrl">
              <p class="suggestion-status" id="newBookEnrichStatus" aria-live="polite"></p>
            </div>
          </div>
          <div class="new-book-actions new-book-field-wide">
            <button class="secondary-button" type="button" id="newBookEnrichButton">自动抓取</button>
            <button class="secondary-button" type="button" id="newBookCancelButton">取消</button>
            <button class="primary-button" type="submit" id="newBookSaveButton">保存新图书</button>
          </div>
        </form>
        <div class="admin-list" id="adminBookList"></div>
      </section>

      <section class="book-list" id="bookList" aria-label="候选图书列表"></section>
    </main>

    <script src="/app.js" defer></script>
  </body>
</html>
