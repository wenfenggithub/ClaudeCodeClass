const { useState, useEffect, useMemo, useRef, createContext, useContext, useCallback } = React;

/* ============================================================
   工具
============================================================ */
const uid = () => (crypto?.randomUUID?.() ?? "id-" + Math.random().toString(36).slice(2));
const cls = (...xs) => xs.filter(Boolean).join(" ");
const pad = (n) => String(n).padStart(2,"0");
const fmtDate = (d) => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const fmtMD = (s) => { const d=new Date(s); return `${d.getMonth()+1} 月 ${d.getDate()} 日`; };
const fmtHM = (d) => `${pad(d.getHours())}:${pad(d.getMinutes())}`;
const parseHM = (s) => { const [h,m] = s.split(":").map(Number); return h*60+m; };
const todayStr = () => fmtDate(new Date());
const subDays = (date, n) => new Date(date.getTime() - n*86400000);

/* ============================================================
   评分引擎（spec.md 4.3）
============================================================ */
const clamp = (n,lo,hi) => Math.max(lo,Math.min(hi,n));

function durationScore(total, target){
  const diff = Math.abs(total - target);
  if (diff <= 30) return 100;
  if (diff <= 60) return 90;
  if (diff <= 90) return 75;
  if (diff <= 120) return 60;
  if (diff <= 150) return 45;
  return 30;
}
function efficiencyScore(e){
  if (e>=0.9) return 100;
  if (e>=0.85) return 92;
  if (e>=0.8) return 82;
  if (e>=0.75) return 72;
  if (e>=0.7) return 62;
  if (e>=0.65) return 52;
  if (e>=0.55) return 40;
  return 30;
}
function latencyScore(L){
  if (L<15) return 100;
  if (L<20) return 92;
  if (L<30) return 80;
  if (L<45) return 65;
  if (L<60) return 50;
  return 35;
}
function awakeningScore(c, dur){
  let s=100;
  if (c===1) s-=8; else if (c===2) s-=20; else if (c>=3) s-=35;
  if (dur>5) s-=5;
  if (dur>20) s-=10;
  if (dur>60) s-=20;
  return clamp(s,25,100);
}
function subjectiveScore(stars){ return clamp(20 + (stars-1)*20, 0, 100); }
function regularityScore(beds, wakes){
  if (beds.length<3) return 80;
  const std = (arr) => {
    const m = arr.map(parseHM);
    const mean = m.reduce((a,b)=>a+b,0)/m.length;
    const v = m.reduce((a,x)=>a+(x-mean)**2,0)/m.length;
    return Math.sqrt(v);
  };
  const a = (std(beds)+std(wakes))/2;
  if (a<20) return 100;
  if (a<35) return 88;
  if (a<50) return 75;
  if (a<70) return 60;
  if (a<90) return 45;
  return 30;
}

const tierOf = (t) => t>=90?"wonderful":t>=70?"nice":t>=50?"okay":t>=30?"tough":"be_kind";
const TIER_TEXT = {
  wonderful:{label:"美妙的一夜", ribbon:"继续保持这样的节奏"},
  nice:{label:"不错", ribbon:"今天的你值得这份轻盈"},
  okay:{label:"还可以", ribbon:"稳住，慢慢往前走"},
  tough:{label:"有点辛苦", ribbon:"今天对自己温柔一点"},
  be_kind:{label:"今天对自己温柔一点", ribbon:"辛苦你了，今晚试着提早 20 分钟休息"}
};
const tierColor = (t) => (t==="wonderful"||t==="nice")?"#9CB89C":(t==="okay")?"#A998C0":"#D7A653";

function pickInsight(d, tier){
  if (d.sleepLatencyMin>=45) return "今晚入睡花了不少时间，睡前 5 分钟的呼吸训练或许会有帮助。";
  if (d.wakeCount>=2) return "你昨晚醒了几次，留意一下傍晚后的咖啡因或屏幕时间。";
  if (d.totalSleepMin<360) return "睡眠时长偏短，今天可以稍微提早 20 分钟准备休息。";
  if (d.subjectiveQuality<=2) return "今天的感受似乎不太好，给自己一些喘息的空间。";
  if (tier==="wonderful") return "状态很棒，你的身体在慢慢记住「能睡好」的感觉。";
  if (tier==="nice") return "睡得还不错，节奏正在稳定下来。";
  return "我们一起一步一步来，今晚比昨晚好一点就够了。";
}

function calcScore(diary, profile, recent){
  const beds = recent.map(d => fmtHM(new Date(d.bedtime)));
  const wakes = recent.map(d => fmtHM(new Date(d.wakeTime)));
  const sd = durationScore(diary.totalSleepMin, profile.targetSleepMin);
  const se = efficiencyScore(diary.sleepEfficiency);
  const sl = latencyScore(diary.sleepLatencyMin);
  const sa = awakeningScore(diary.wakeCount, diary.wakeDurationMin);
  const ss = subjectiveScore(diary.subjectiveQuality);
  const sr = regularityScore(beds, wakes);
  const total = Math.round(sd*.25 + se*.3 + sl*.15 + sa*.15 + ss*.1 + sr*.05);
  const tier = tierOf(total);
  return {
    scoreId: uid(),
    diaryId: diary.diaryId,
    total,
    durationScore: Math.round(sd),
    efficiencyScore: Math.round(se),
    latencyScore: Math.round(sl),
    awakeningScore: Math.round(sa),
    subjectiveScore: Math.round(ss),
    regularityScore: Math.round(sr),
    tier,
    insight: pickInsight(diary, tier)
  };
}

function computeTimes(bed, wake, lat, wakeDur){
  const tib = Math.max(0, Math.round((wake - bed) / 60000));
  const total = Math.max(0, tib - lat - wakeDur);
  const eff = tib > 0 ? total/tib : 0;
  return { timeInBedMin: tib, totalSleepMin: total, sleepEfficiency: Number(eff.toFixed(3)) };
}

/* ============================================================
   规则引擎 v1（spec.md 4.10）
============================================================ */
const RULES = [
  { id:"SHORT_SLEEP_3", priority:90, severity:"suggest", check:(p, ds) => {
    const last3 = ds.slice(-3); if (last3.length<3) return null;
    if (!last3.every(d => d.totalSleepMin < Math.min(p.targetSleepMin-60, 360))) return null;
    return "你已经连续 3 天睡得偏少，今天可以提前 30 分钟准备睡觉，给身体一点缓冲。";
  }},
  { id:"LONG_LATENCY_3", priority:88, severity:"suggest", check:(p, ds) => {
    const last3 = ds.slice(-3); if (last3.length<3) return null;
    if (!last3.every(d => d.sleepLatencyMin>=30)) return null;
    return "最近入睡都偏长，要不要试试 4-7-8 呼吸？通常 5 分钟就能让你松下来。";
  }},
  { id:"FREQUENT_AWAKENING_7", priority:80, severity:"suggest", check:(p, ds) => {
    const last7 = ds.slice(-7); if (last7.length<5) return null;
    const avg = last7.reduce((s,d)=>s+d.wakeCount,0)/last7.length;
    if (avg<2) return null;
    return "最近夜里醒得比较多，留意一下傍晚后是否摄入了咖啡因或酒精。";
  }},
  { id:"HIGH_STRESS_5", priority:85, severity:"suggest", check:(p, ds) => {
    const last5 = ds.slice(-5).filter(d=>d.stressLevel!=null); if (last5.length<3) return null;
    const high = last5.filter(d=>d.stressLevel>=4);
    if (high.length<3) return null;
    return "最近压力指数偏高，睡前 10 分钟的「担忧时间」可能会帮你卸下一点。";
  }},
  { id:"LATE_SCREEN_5", priority:70, severity:"suggest", check:(p, ds) => {
    const last5 = ds.slice(-5).filter(d => d.lastScreenTime && d.bedtime);
    if (last5.length<3) return null;
    const late = last5.filter(d => {
      const diff = (new Date(d.bedtime).getTime() - new Date(d.lastScreenTime).getTime())/60000;
      return diff < 30;
    });
    if (late.length<3) return null;
    return "在睡前 30 分钟收起手机，可能会让入睡快很多。";
  }},
  { id:"LATE_CAFFEINE_7", priority:65, severity:"suggest", check:(p, ds) => {
    const last7 = ds.slice(-7);
    const evening = last7.filter(d => d.caffeine === "afternoon" || d.caffeine === "evening");
    if (evening.length<3) return null;
    return "下午 3 点后的咖啡因，可能正在偷走你的深睡眠。";
  }},
  { id:"ALCOHOL_HIGH_7", priority:60, severity:"suggest", check:(p, ds) => {
    const last7 = ds.slice(-7);
    const heavy = last7.filter(d => d.alcohol === "heavy");
    if (heavy.length<3) return null;
    return "酒精虽然让人更快睡着，但会显著降低后半夜的睡眠质量。";
  }},
  { id:"LATE_BEDTIME_3", priority:55, severity:"suggest", check:(p, ds) => {
    const last3 = ds.slice(-3); if (last3.length<3) return null;
    const tgt = parseHM(p.targetBedtime);
    const allLate = last3.every(d => {
      const t = new Date(d.bedtime); const cur = t.getHours()*60+t.getMinutes();
      const norm = cur<360 ? cur+1440 : cur;
      const tg = tgt<360 ? tgt+1440 : tgt;
      return norm - tg >= 60;
    });
    if (!allLate) return null;
    return `最近上床都比目标晚了一个多小时，明晚可以试试 ${p.targetBedtime} 前关灯。`;
  }},
  { id:"LOW_EFFICIENCY_14", priority:95, severity:"warning", check:(p, ds) => {
    const last14 = ds.slice(-14); if (last14.length<10) return null;
    const avg = last14.reduce((s,d)=>s+d.sleepEfficiency,0)/last14.length;
    if (avg>=0.65) return null;
    return "你近两周的睡眠效率持续偏低，如果同时有日间疲劳，建议考虑预约睡眠科。";
  }},
  { id:"MOOD_LOW_30", priority:92, severity:"warning", check:(p, ds) => {
    const last30 = ds.slice(-30); if (last30.length<14) return null;
    const lowCount = last30.reduce((s,d)=> s + ((d.moodTags||[]).includes("low")||(d.moodTags||[]).includes("anxious") ? 1 : 0), 0);
    if (lowCount<14) return null;
    return "近一段时间情绪偏低落，必要时心理科或心理咨询能给你一些支持。";
  }}
];

function evaluateRules(profile, diaries, recentInsights){
  const today = todayStr();
  const cutoff = subDays(new Date(), 7).getTime();
  const recentRules = new Set(recentInsights.filter(i => new Date(i.date).getTime() > cutoff).map(i => i.ruleId));
  const ds = [...diaries].sort((a,b)=>a.date.localeCompare(b.date));
  const hits = [];
  for (const r of RULES){
    if (recentRules.has(r.id)) continue;
    const msg = r.check(profile, ds);
    if (msg) hits.push({ ruleId:r.id, message:msg, severity:r.severity, priority:r.priority });
  }
  hits.sort((a,b)=>b.priority - a.priority);
  return hits.slice(0,3).map(h => ({
    insightId: uid(), userId: profile.userId, date: today,
    ruleId: h.ruleId, message: h.message, severity: h.severity
  }));
}

/* ============================================================
   风险识别（spec.md 4.11）
============================================================ */
const SUICIDE_KEYWORDS = ["想死","不想活","活不下去","自杀","结束自己","结束生命","了结","撑不下去","活着没意思","没意义","自残","自伤","kill myself","suicide","end my life","want to die"];
const containsSelfHarm = (t) => !!t && SUICIDE_KEYWORDS.some(k => t.toLowerCase().includes(k.toLowerCase()));

function checkInitialRisk(p){
  const out = [];
  const longD = p.troubleDuration === "6_12m" || p.troubleDuration === "gt_1y";
  if (longD && p.severity >= 4){
    out.push({
      ruleId:"INITIAL_LONG_SEVERE", level:"moderate",
      message:"你的睡眠困扰已经持续了较长时间，建议预约一次睡眠科或精神心理科的咨询。这不是失败，只是身体在请求专业的支持。"
    });
  }
  if ((p.troubleTypes||[]).includes("snoring")){
    out.push({
      ruleId:"INITIAL_SNORING", level:"moderate",
      message:"如果你打鼾且常感到白天困倦，建议筛查一次睡眠呼吸暂停（OSA）。耳鼻喉或睡眠科都可以做。"
    });
  }
  return out;
}

function planDayIndex(plan){
  const start = new Date(plan.startedAt + "T00:00:00");
  const days = Math.floor((Date.now()-start.getTime())/86400000);
  return Math.max(1, Math.min(21, days+1));
}

const EMPTY_STATE = {
  profile: null,
  diaries: [],
  scores: [],
  plan: null,
  planTasks: [],
  practices: [],
  insights: [],
  riskFlags: [],
  worries: [],
  reframes: [],
  favoriteSounds: [],
  recentSounds: [],

};
function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return EMPTY_STATE;
    const p = JSON.parse(raw);
    return { ...EMPTY_STATE, ...p, settings: { ...DEFAULT_SETTINGS, ...(p.settings||{}) } };
  } catch { return EMPTY_STATE; }
}
function saveState(s){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); } catch {}
}

const StoreCtx = createContext(null);
const useStore = () => useContext(StoreCtx);

function StoreProvider({ children }){
  const [s, _set] = useState(() => loadState());
  const set = useCallback((patch) => {
    _set(prev => {
      const next = typeof patch === "function" ? patch(prev) : { ...prev, ...patch };
      saveState(next);
      return next;
    });
  }, []);
  const api = useMemo(() => ({
    state: s,
    set,
    setProfile: (p) => set(prev => ({ ...prev, profile: p })),
    addDiary: (d, sc) => set(prev => ({ ...prev, diaries:[...prev.diaries, d], scores:[...prev.scores, sc] })),
    setPlan: (plan, tasks) => set(prev => ({ ...prev, plan, planTasks: tasks })),
    toggleTask: (taskId) => set(prev => ({
      ...prev,
      planTasks: prev.planTasks.map(t => t.taskId===taskId ? {...t, done:!t.done, doneAt: !t.done ? new Date().toISOString() : undefined} : t)
    })),
    addInsights: (items) => set(prev => ({ ...prev, insights:[...prev.insights, ...items] })),
    addRiskFlag: (flag) => set(prev => {
      const cutoff = Date.now() - 7*86400000;
      if (prev.riskFlags.find(f => f.ruleId === flag.ruleId && new Date(f.triggeredAt).getTime() > cutoff)) return prev;
      return { ...prev, riskFlags: [...prev.riskFlags, flag] };
    }),
    ackRiskFlag: (id) => set(prev => ({ ...prev, riskFlags: prev.riskFlags.map(f => f.flagId===id?{...f, acknowledged:true}:f) })),
    addPractice: (p) => set(prev => ({ ...prev, practices:[...prev.practices, p] })),
    addWorry: (w) => set(prev => ({ ...prev, worries:[...prev.worries, w] })),
    archiveWorry: (worryId) => set(prev => ({
      ...prev,
      worries: prev.worries.map(w => w.worryId===worryId ? {...w, archived:true, archivedAt:new Date().toISOString()} : w)
    })),
    deleteWorry: (worryId) => set(prev => ({ ...prev, worries: prev.worries.filter(w => w.worryId!==worryId) })),
    addReframe: (r) => set(prev => ({ ...prev, reframes:[...prev.reframes, r] })),
    deleteReframe: (id) => set(prev => ({ ...prev, reframes: prev.reframes.filter(r => r.reframeId!==id) })),
    toggleFavoriteSound: (id) => set(prev => ({
      ...prev,
      favoriteSounds: prev.favoriteSounds.includes(id) ? prev.favoriteSounds.filter(x=>x!==id) : [id, ...prev.favoriteSounds]
    })),
    trackRecentSound: (id) => set(prev => ({
      ...prev,
      recentSounds: [id, ...prev.recentSounds.filter(x=>x!==id)].slice(0, 8)
    })),
    updateSettings: (patch) => set(prev => ({ ...prev, settings: { ...prev.settings, ...patch } })),
    resetAll: () => { localStorage.removeItem(STORAGE_KEY); _set(EMPTY_STATE); }
  }), [s, set]);
  return <StoreCtx.Provider value={api}>{children}</StoreCtx.Provider>;
}

/* ============================================================
   Theme
============================================================ */
function ThemeManager(){
  const { state } = useStore();
  useEffect(() => {
    const apply = () => {
      const html = document.documentElement;
      const m = state.settings.themeMode;
      let dark = false;
      if (m === "dark") dark = true;
      else if (m === "system") dark = matchMedia("(prefers-color-scheme: dark)").matches;
      else if (m === "auto-night"){
        const now = new Date();
        const cur = now.getHours()*60+now.getMinutes();
        const s = parseHM(state.settings.autoNightStart);
        const e = parseHM(state.settings.autoNightEnd);
        dark = s < e ? (cur>=s && cur<e) : (cur>=s || cur<e);
      }
      html.classList.toggle("dark", dark);
      document.querySelector('meta[name="theme-color"]')?.setAttribute("content", dark ? "#100D14" : "#F7F5F2");
    };
    apply();
    const i = setInterval(apply, 60000);
    const mq = matchMedia("(prefers-color-scheme: dark)");
    mq.addEventListener("change", apply);
    return () => { clearInterval(i); mq.removeEventListener("change", apply); };
  }, [state.settings.themeMode, state.settings.autoNightStart, state.settings.autoNightEnd]);
  return null;
}

function SelectGroup({ options, value, onChange, multiple, columns=2 }){
  const colsClass = columns===1?"grid-cols-1":columns===3?"grid-cols-3":columns===4?"grid-cols-4":"grid-cols-2";
  const isActive = (v) => multiple ? value.includes(v) : value===v;
  const toggle = (v) => {
    if (multiple){
      if (value.includes(v)) onChange(value.filter(x=>x!==v));
      else onChange([...value, v]);
    } else onChange(v);
  };
  return (
    <div className={cls("grid gap-2", colsClass)}>
      {options.map(o => {
        const a = isActive(o.value);
        return (
          <button key={o.value} type="button" onClick={()=>toggle(o.value)}
            className={cls(
              "px-4 py-3 rounded-soft text-left transition border",
              a ? "bg-moon-50 border-moon-300 text-moon-700 dark:bg-moon-700/40 dark:border-moon-300 dark:text-moon-100"
                : "bg-white border-ink-200 text-ink-700 hover:bg-ink-50 dark:bg-ink-800 dark:border-ink-700 dark:text-ink-100"
            )}>
            <div className="text-sm font-medium">{o.label}</div>
            {o.hint && <div className="text-xs text-ink-400 dark:text-ink-300 mt-0.5">{o.hint}</div>}
          </button>
        );
      })}
    </div>
  );
}

function ScoreArc({ score, size=180 }){
  const tier = tierOf(score);
  const t = TIER_TEXT[tier];
  const r = size/2 - 14;
  const cx = size/2, cy = size/2;
  const total = 270, start = 135, end = start+total;
  const polar = (a) => { const r2 = (a*Math.PI)/180; return [cx+r*Math.cos(r2), cy+r*Math.sin(r2)]; };
  const [x1,y1] = polar(start);
  const [x2,y2] = polar(end);
  const bgPath = `M ${x1} ${y1} A ${r} ${r} 0 1 1 ${x2} ${y2}`;
  const pct = clamp(score/100, 0, 1);
  const fEnd = start + total*pct;
  const [fx,fy] = polar(fEnd);
  const fLarge = total*pct > 180 ? 1 : 0;
  const fPath = `M ${x1} ${y1} A ${r} ${r} 0 ${fLarge} 1 ${fx} ${fy}`;
  const color = tierColor(tier);
  return (
    <div className="flex flex-col items-center">
      <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
        <path d={bgPath} fill="none" stroke="currentColor" className="text-ink-100 dark:text-ink-700" strokeWidth={10} strokeLinecap="round"/>
        <path d={fPath} fill="none" stroke={color} strokeWidth={10} strokeLinecap="round"/>
        <text x={cx} y={cy-4} textAnchor="middle" className="fill-ink-700 dark:fill-ink-50" style={{fontSize:36,fontWeight:600}}>{score}</text>
        <text x={cx} y={cy+22} textAnchor="middle" className="fill-ink-400 dark:fill-ink-300" style={{fontSize:12}}>昨晚的睡眠分</text>
      </svg>
      <div className="text-center mt-1">
        <div className="text-lg font-medium">{t.label}</div>
        <div className="text-sm text-ink-500 dark:text-ink-300 mt-1">{t.ribbon}</div>
      </div>
    </div>
  );
}

function MiniBarChart({ points, max=100, height=110 }){
  if (points.length===0) return <div className="text-sm text-ink-400 py-6 text-center">暂无数据</div>;
  const w = 280, pad = 24, bw = (w - pad*2) / points.length - 6;
  return (
    <svg viewBox={`0 0 ${w} ${height+30}`} className="w-full">
      {points.map((p,i) => {
        const h = (p.value/max) * height;
        const x = pad + i*((w-pad*2)/points.length);
        const y = height - h + 8;
        return (
          <g key={i}>
            <rect x={x} y={y} width={bw} height={h} rx="3" fill={tierColor(tierOf(p.value))} opacity="0.9"/>
            <text x={x + bw/2} y={height + 22} textAnchor="middle" className="fill-ink-400 dark:fill-ink-300" style={{fontSize:10}}>
              {p.label}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function RhythmDots({ data, height=140 }){
  if (data.length===0) return <div className="text-sm text-ink-400 py-6 text-center">至少 2 条日记后开放</div>;
  const w = 280, pad = 28;
  const yMin = 18*60, yMax = 12*60 + 24*60;
  const yScale = (m) => height - ((m-yMin)/(yMax-yMin))*(height-20) + 8;
  const xs = (i) => pad + (i+0.5)*((w-pad*2)/data.length);
  return (
    <svg viewBox={`0 0 ${w} ${height+30}`} className="w-full">
      {[20,24,28].map(h => {
        const y = yScale(h*60);
        return (
          <g key={h}>
            <line x1={pad} x2={w-pad} y1={y} y2={y} stroke="#D8D2C7" strokeDasharray="2 4"/>
            <text x={pad-4} y={y+3} textAnchor="end" className="fill-ink-400" style={{fontSize:9}}>
              {h>=24 ? `${h-24}:00` : `${h}:00`}
            </text>
          </g>
        );
      })}
      {data.map((p,i) => (
        <g key={i}>
          <circle cx={xs(i)} cy={yScale(p.bedMin)} r={5} fill="#65557A" />
          <rect x={xs(i)-4} y={yScale(p.wakeMin)-4} width={8} height={8} fill="#D7A653" transform={`rotate(45 ${xs(i)} ${yScale(p.wakeMin)})`} />

        </g>

function BreathingOrb({ method, running }){
  const [stepIdx, setStepIdx] = useState(0);
  const [elapsedMs, setElapsedMs] = useState(0);
  const rafRef = useRef(null);
  const lastRef = useRef(null);
  useEffect(() => {
    if (!running){ lastRef.current = null; return; }
    const tick = (now) => {
      if (lastRef.current == null) lastRef.current = now;
      const dt = now - lastRef.current; lastRef.current = now;
      setElapsedMs(e => e + dt);
      rafRef.current = requestAnimationFrame(tick);
    };
    rafRef.current = requestAnimationFrame(tick);
    return () => rafRef.current && cancelAnimationFrame(rafRef.current);
  }, [running, stepIdx]);
  useEffect(() => {
    const cur = method.steps[stepIdx];
    if (elapsedMs >= cur.ms){
      setElapsedMs(0);
      setStepIdx((stepIdx+1)%method.steps.length);
    }
  }, [elapsedMs, stepIdx, method]);
  useEffect(() => { setStepIdx(0); setElapsedMs(0); }, [method.id]);

  const cur = method.steps[stepIdx];
  const pr = Math.min(1, elapsedMs / cur.ms);
  const scale = cur.phase==="in" ? 0.6 + pr*0.4
               : cur.phase==="out" ? 1 - pr*0.4
               : cur.phase==="hold-in" ? 1 : 0.6;
  const remaining = Math.max(0, Math.ceil((cur.ms - elapsedMs)/1000));
  return (
    <div className="flex flex-col items-center justify-center select-none">
      <div className="rounded-full"
           style={{
             width:240, height:240,
             background:"radial-gradient(circle at 30% 30%, #CDBEE0, #65557A)",
             boxShadow:"0 0 80px rgba(168,152,192,0.3)",
             transform:`scale(${scale})`,
             transition:`transform ${cur.ms}ms linear`
           }}/>
      <div className="mt-8 text-center">
        <div className="text-2xl font-medium">{cur.label}</div>
        <div className="text-base text-ink-400 dark:text-ink-300 mt-1">{remaining} 秒</div>
      </div>
    </div>
  );
}

const greeting = () => {
  const h = new Date().getHours();
  if (h<5) return "夜深了";
  if (h<11) return "早安";
  if (h<14) return "午安";
  if (h<18) return "下午好";
  return "晚安";
};

function HomePage({ onNav, onChooseBreath }){
  const { state, addInsights } = useStore();
  const { profile, diaries, scores, insights, riskFlags, plan, planTasks } = state;

  const lastDiary = useMemo(() => {
    if (diaries.length===0) return null;
    return [...diaries].sort((a,b)=>b.date.localeCompare(a.date))[0];
  }, [diaries]);
  const lastScore = useMemo(() => scores.find(s=>s.diaryId===lastDiary?.diaryId), [scores, lastDiary]);

  const today = todayStr();
  useEffect(() => {
    if (!profile || diaries.length===0) return;
    if (insights.some(i=>i.date===today)) return;
    const fresh = evaluateRules(profile, diaries, insights);
    if (fresh.length) addInsights(fresh);
  }, [profile?.userId, diaries.length]);

  const todayInsights = insights.filter(i => i.date===today);
  const activeFlags = riskFlags.filter(f => !f.acknowledged);

  const todayPlanTasks = useMemo(() => {
    if (!plan) return [];
    const day = planDayIndex(plan);
    return planTasks.filter(t => t.dayIndex === day);
  }, [plan, planTasks]);

  return (
    <div className="px-5 pt-10 space-y-5">
      <header>
        <div className="text-sm text-ink-400 dark:text-ink-300">
          {greeting()}{profile.nickname ? `，${profile.nickname}` : ""}
        </div>
        <h1 className="text-2xl font-medium mt-1">今天对自己温柔一点</h1>
      </header>

      {activeFlags.map(f => <RiskBanner key={f.flagId} flag={f}/>)}

      <Card>
        {lastDiary && lastScore ? (
          <button onClick={()=>onNav("reports")} className="block w-full">
            <ScoreArc score={lastScore.total}/>
            <p className="text-sm leading-relaxed text-ink-500 dark:text-ink-300 mt-3 px-2 text-left">{lastScore.insight}</p>
            <div className="text-xs text-ink-400 dark:text-ink-300 mt-3 text-right">{fmtMD(lastDiary.date)} 的睡眠 →</div>
          </button>
        ) : (
          <div className="text-center py-6 space-y-3">
            <div className="text-base">还没有睡眠记录</div>
            <p className="text-sm text-ink-500 dark:text-ink-300">第一份睡眠日记 60 秒可以填完，慢慢来。</p>
            <Button onClick={()=>onNav("diary-new")}>开始记录昨晚</Button>
          </div>
        )}
      </Card>

      {todayInsights.length>0 && (
        <section className="space-y-3">
          <div className="text-sm font-medium text-ink-500 dark:text-ink-300 px-1">今天的小建议</div>
          {todayInsights.map(i => (
            <Card key={i.insightId} className={cls("border-l-4",
              i.severity==="warning"?"border-l-amber-300":i.severity==="suggest"?"border-l-moon-300":"border-l-ink-300")}>
              <div className="text-base text-ink-700 dark:text-ink-100 leading-relaxed">{i.message}</div>
            </Card>
          ))}
        </section>
      )}

      {todayPlanTasks.length>0 && (
        <Card>
          <div className="flex items-center justify-between">
            <div className="text-sm font-medium">今日计划</div>
            <button onClick={()=>onNav("plan")} className="text-xs text-moon-600 dark:text-moon-200">查看全部 →</button>
          </div>
          <ul className="mt-3 space-y-2">
            {todayPlanTasks.map(t => (
              <li key={t.taskId} className="flex items-start gap-2 text-sm">
                <span className={t.done?"text-score-high":"text-ink-300 dark:text-ink-600"}>{t.done?"●":"○"}</span>
                <div className={t.done?"line-through text-ink-400":""}>{t.title}</div>
              </li>
            ))}
          </ul>
        </Card>
      )}

      <section className="grid grid-cols-2 gap-3">
        <button onClick={()=>onChooseBreath("478")} className="text-left">
          <Card className="h-full">
            <div className="text-3xl">🫧</div>
            <div className="text-base font-medium mt-2">4-7-8 呼吸</div>
            <div className="text-xs text-ink-400 dark:text-ink-300 mt-1">5 分钟·快速放松</div>
          </Card>
        </button>
        <button onClick={()=>onNav("sounds")} className="text-left">
          <Card className="h-full">
            <div className="text-3xl">♪</div>
            <div className="text-base font-medium mt-2">助眠音频</div>
            <div className="text-xs text-ink-400 dark:text-ink-300 mt-1">低频陪伴</div>
          </Card>
        </button>
      </section>

      <Button block size="lg" variant="outline" onClick={()=>onNav("diary-new")}>

  );

function nightDate(d){
  if (d.getHours() < 12) return fmtDate(subDays(d, 1));
  return fmtDate(d);
}

function DiaryNewPage({ onDone }){
  const { state, addDiary, addRiskFlag } = useStore();
  const profile = state.profile;
  const [step, setStep] = useState(0);

  const yesterday = subDays(new Date(), 1);
  const [bedDate, setBedDate] = useState(fmtDate(yesterday));
  const [bedTime, setBedTime] = useState(profile.targetBedtime);
  const [wakeDate, setWakeDate] = useState(fmtDate(new Date()));
  const [wakeTime, setWakeTime] = useState(profile.targetWakeTime);
  const [latency, setLatency] = useState("15_30");
  const [wakeCount, setWakeCount] = useState(0);
  const [wakeDur, setWakeDur] = useState("0");
  const [quality, setQuality] = useState(3);
  const [morningState, setMorningState] = useState("ok");
  const [moods, setMoods] = useState([]);
  const [stress, setStress] = useState(3);
  const [caffeine, setCaffeine] = useState("none");
  const [alcohol, setAlcohol] = useState("none");
  const [exercise, setExercise] = useState("none");
  const [screen, setScreen] = useState("lt15");
  const [nap, setNap] = useState("none");
  const [note, setNote] = useState("");

  const bed = useMemo(()=>new Date(`${bedDate}T${bedTime}:00`), [bedDate, bedTime]);
  const wake = useMemo(()=>new Date(`${wakeDate}T${wakeTime}:00`), [wakeDate, wakeTime]);
  const latMid = LATENCY_BUCKETS.find(b=>b.value===latency).mid;
  const wakeMid = WAKE_DUR_BUCKETS.find(b=>b.value===wakeDur).mid;
  const screenMid = SCREEN_BUCKETS.find(b=>b.value===screen).mid;
  const napMid = NAP_BUCKETS.find(b=>b.value===nap).mid;
  const computed = useMemo(()=>computeTimes(bed, wake, latMid, wakeMid), [bed, wake, latMid, wakeMid]);

  const total = 6;
  const next = () => setStep(s=>Math.min(total-1, s+1));
  const prev = () => setStep(s=>Math.max(0, s-1));

  const submit = () => {
    const dateStr = nightDate(bed);
    const lastScreenTime = screen === "none"
      ? undefined
      : new Date(bed.getTime() - screenMid * 60 * 1000).toISOString();
    const diary = {
      diaryId: uid(),
      userId: profile.userId,
      date: dateStr,
      bedtime: bed.toISOString(),
      sleepLatencyMin: latMid,
      wakeCount,
      wakeDurationMin: wakeMid,
      wakeTime: wake.toISOString(),
      timeInBedMin: computed.timeInBedMin,
      totalSleepMin: computed.totalSleepMin,
      sleepEfficiency: computed.sleepEfficiency,
      subjectiveQuality: quality,
      morningState,
      moodTags: moods,
      stressLevel: stress,
      caffeine,
      alcohol,
      exercise,
      lastScreenTime,
      napMin: napMid,
      note: note || undefined,
      source: "manual",
      createdAt: new Date().toISOString(),
      updatedAt: new Date().toISOString()
    };
    const recent = [...state.diaries].sort((a,b)=>a.date.localeCompare(b.date)).slice(-7);
    const score = calcScore(diary, profile, recent);
    addDiary(diary, score);
    if (containsSelfHarm(note)){
      addRiskFlag({
        flagId: uid(), userId: profile.userId, acknowledged: false,
        triggeredAt: new Date().toISOString(),
        ruleId:"SELFHARM_KEYWORD", level:"urgent",
        message:"看见你写下的话有点担心你。如果情绪很糟糕，请考虑立刻拨打心理援助热线，他们 24 小时都在。"
      });
    }
    onDone();
  };

  const valid = step===0 ? bed < wake : true;

  return (
    <div className="px-5 pt-10 pb-12 space-y-6">
      <div className="flex gap-1.5">
        {Array.from({length:total}).map((_,i)=>(
          <div key={i} className={cls("h-1 flex-1 rounded-full", i<=step?"bg-moon-400 dark:bg-moon-300":"bg-ink-100 dark:bg-ink-700")}/>
        ))}
      </div>

      {step===0 && (
        <section className="space-y-5">
          <h1 className="text-xl font-medium">昨晚的卧床时间</h1>
          <Card>
            <div className="text-sm text-ink-500 dark:text-ink-300 mb-1">上床时间</div>
            <div className="flex gap-3">
              <input type="date" value={bedDate} onChange={(e)=>setBedDate(e.target.value)} className="text-base bg-transparent outline-none flex-1"/>
              <input type="time" value={bedTime} onChange={(e)=>setBedTime(e.target.value)} className="text-base bg-transparent outline-none"/>
            </div>
          </Card>
          <Card>
            <div className="text-sm text-ink-500 dark:text-ink-300 mb-1">起床时间</div>
            <div className="flex gap-3">
              <input type="date" value={wakeDate} onChange={(e)=>setWakeDate(e.target.value)} className="text-base bg-transparent outline-none flex-1"/>
              <input type="time" value={wakeTime} onChange={(e)=>setWakeTime(e.target.value)} className="text-base bg-transparent outline-none"/>
            </div>
          </Card>
          <div className="text-xs text-ink-400 dark:text-ink-300">预计卧床：{Math.floor(computed.timeInBedMin/60)}h{computed.timeInBedMin%60}m</div>
        </section>
      )}

      {step===1 && (
        <section className="space-y-5">
          <h1 className="text-xl font-medium">大约多久睡着？</h1>
          <SelectGroup options={LATENCY_BUCKETS.map(b=>({value:b.value,label:b.label}))} value={latency} onChange={setLatency} columns={2}/>
          <h2 className="text-xl font-medium pt-4">夜里醒来几次？</h2>
          <SelectGroup options={[
            {value:"0",label:"0 次"},{value:"1",label:"1 次"},{value:"2",label:"2 次"},{value:"3",label:"3 次或以上"}
          ]} value={String(wakeCount)} onChange={(v)=>setWakeCount(Number(v))} columns={4}/>
          {wakeCount>0 && (
            <>
              <h2 className="text-base font-medium pt-2">夜醒累计大约多长时间？</h2>
              <SelectGroup options={WAKE_DUR_BUCKETS.map(b=>({value:b.value,label:b.label}))} value={wakeDur} onChange={setWakeDur} columns={2}/>
            </>
          )}
        </section>
      )}

      {step===2 && (
        <section className="space-y-6">
          <h1 className="text-xl font-medium">主观感受</h1>
          <Card>
            <div className="text-sm text-ink-500 dark:text-ink-300 mb-3">昨晚的睡眠质量</div>

      )}

      {step===3 && (

          <Card>

        </section>
      )}

      {step===4 && (
        <section className="space-y-5">
          <h1 className="text-xl font-medium">回顾昨天</h1>

            <SelectGroup options={[

              {value:"moderate",label:"中"},{value:"intense",label:"强"}
            ]} value={exercise} onChange={setExercise} columns={4}/>
          </div>

          <div className="space-y-2">
            <div className="text-sm text-ink-500 dark:text-ink-300">睡前最后看屏幕</div>
            <SelectGroup options={SCREEN_BUCKETS.map(b=>({value:b.value,label:b.label}))}
              value={screen} onChange={setScreen} columns={1}/>
          </div>

          <div className="space-y-2">
            <div className="text-sm text-ink-500 dark:text-ink-300">昨天午睡</div>
            <SelectGroup options={NAP_BUCKETS.map(b=>({value:b.value,label:b.label}))}
              value={nap} onChange={setNap} columns={4}/>
          </div>
        </section>
      )}

      {step===5 && (
        <section className="space-y-4">
          <h1 className="text-xl font-medium">想多说一些吗？</h1>
          <p className="text-sm text-ink-500 dark:text-ink-300">备注仅本地保存，不会上传。</p>
          <textarea value={note} onChange={(e)=>setNote(e.target.value)} rows={5} maxLength={500}
            placeholder="比如：今天有点担心明天的会议……"
            className="w-full px-4 py-3 rounded-soft bg-white dark:bg-ink-800 border border-ink-200 dark:border-ink-700 text-base resize-none"/>
        </section>
      )}

      <div className="flex gap-3 pt-4">
        {step>0 && <Button variant="ghost" onClick={prev}>上一步</Button>}
        {step<total-1 && <Button block disabled={!valid} onClick={next}>继续</Button>}
        {step===total-1 && <Button block onClick={submit}>完成今天的记录</Button>}
      </div>
    </div>
  );
}

   Pages: Reports
============================================================ */
function ReportsPage(){
  const { state } = useStore();
  const [range, setRange] = useState("week");
  const sorted = useMemo(()=>[...state.diaries].sort((a,b)=>a.date.localeCompare(b.date)), [state.diaries]);
  const last = sorted[sorted.length-1] || null;
  const lastScore = last ? state.scores.find(s=>s.diaryId===last.diaryId) : null;

  const since = subDays(new Date(), 6);
  const last7 = sorted.filter(d => new Date(d.date) >= since);
  const trend = last7.map(d => {
    const sc = state.scores.find(s=>s.diaryId===d.diaryId);
    return { label: d.date.slice(5).replace("-","/"), value: sc?.total || 0 };
  });
  const rhythm = last7.map(d => {
    const bed = new Date(d.bedtime), wake = new Date(d.wakeTime);
    const minOf = (D) => D.getHours()*60 + D.getMinutes();
    let bedMin = minOf(bed), wakeMin = minOf(wake);
    if (bedMin < 12*60) bedMin += 24*60;
    if (wakeMin < 12*60) wakeMin += 24*60;
    return { label: d.date.slice(5).replace("-","/"), bedMin, wakeMin };
  });

  const avg = (arr, fn) => arr.length===0?0: arr.reduce((s,x)=>s+fn(x),0)/arr.length;
  const avgDur = avg(last7, d=>d.totalSleepMin)/60;
  const avgEff = avg(last7, d=>d.sleepEfficiency);
  const avgScore = (() => {
    const ids = new Set(last7.map(d=>d.diaryId));
    const arr = state.scores.filter(s=>ids.has(s.diaryId));
    return arr.length===0?0:Math.round(arr.reduce((s,x)=>s+x.total,0)/arr.length);
  })();

  return (
    <div className="px-5 pt-10 pb-12 space-y-5">
      <header>
        <h1 className="text-2xl font-medium">睡眠报告</h1>
        <div className="flex gap-2 mt-3">
          <button onClick={()=>setRange("day")} className={cls("px-4 py-1.5 rounded-pill text-sm",
            range==="day"?"bg-moon-500 text-white dark:bg-moon-300 dark:text-ink-900":"bg-ink-100 dark:bg-ink-700 text-ink-500 dark:text-ink-200")}>日报</button>
          <button onClick={()=>setRange("week")} className={cls("px-4 py-1.5 rounded-pill text-sm",
            range==="week"?"bg-moon-500 text-white dark:bg-moon-300 dark:text-ink-900":"bg-ink-100 dark:bg-ink-700 text-ink-500 dark:text-ink-200")}>周报</button>
        </div>
      </header>

      {!last && (
        <Card className="text-center py-8 text-ink-400 dark:text-ink-300">
          还没有睡眠记录
        </Card>
      )}

      {range==="day" && last && lastScore && (
        <>
          <Card className="space-y-4">
            <div className="text-xs text-ink-400 dark:text-ink-300">{fmtMD(last.date)}</div>
            <ScoreArc score={lastScore.total}/>
            <p className="text-sm text-ink-500 dark:text-ink-300 leading-relaxed">{lastScore.insight}</p>
          </Card>
          <Card>
            <div className="text-sm font-medium mb-3">六维度细分</div>
            <ul className="space-y-3">
              {[["时长",lastScore.durationScore],["效率",lastScore.efficiencyScore],["入睡潜伏",lastScore.latencyScore],
                ["夜醒",lastScore.awakeningScore],["主观",lastScore.subjectiveScore],["规律性",lastScore.regularityScore]].map(([l,v])=>(
                <li key={l}>
                  <div className="flex justify-between text-sm">
                    <span className="text-ink-500 dark:text-ink-300">{l}</span>
                    <span className="font-medium">{v}</span>
                  </div>
                  <div className="h-1.5 mt-1 bg-ink-100 dark:bg-ink-700 rounded-full">
                    <div className="h-1.5 bg-moon-400 dark:bg-moon-300 rounded-full" style={{width:`${v}%`}}/>
                  </div>
                </li>
              ))}
            </ul>
          </Card>
          <Card>
            <div className="text-sm font-medium mb-2">细节</div>
            <dl className="text-sm space-y-1.5">
              <div className="flex justify-between"><dt className="text-ink-500 dark:text-ink-300">上床</dt><dd>{fmtHM(new Date(last.bedtime))}</dd></div>
              <div className="flex justify-between"><dt className="text-ink-500 dark:text-ink-300">起床</dt><dd>{fmtHM(new Date(last.wakeTime))}</dd></div>
              <div className="flex justify-between"><dt className="text-ink-500 dark:text-ink-300">入睡耗时</dt><dd>{last.sleepLatencyMin} 分钟</dd></div>
              <div className="flex justify-between"><dt className="text-ink-500 dark:text-ink-300">夜醒</dt><dd>{last.wakeCount} 次 · {last.wakeDurationMin} 分钟</dd></div>
              <div className="flex justify-between"><dt className="text-ink-500 dark:text-ink-300">睡眠效率</dt><dd>{Math.round(last.sleepEfficiency*100)}%</dd></div>
            </dl>
          </Card>
        </>
      )}

      {range==="week" && last && (
        <>
          <Card>
            <div className="grid grid-cols-3 gap-4 text-center">
              <div><div className="text-xs text-ink-400">平均时长</div><div className="text-xl font-medium mt-1">{avgDur.toFixed(1)}h</div></div>
              <div><div className="text-xs text-ink-400">平均效率</div><div className="text-xl font-medium mt-1">{Math.round(avgEff*100)}%</div></div>
              <div><div className="text-xs text-ink-400">平均分</div><div className="text-xl font-medium mt-1">{avgScore}</div></div>
            </div>
          </Card>
          <Card>
            <div className="text-sm font-medium mb-2">最近 7 晚分数</div>
            <MiniBarChart points={trend}/>
          </Card>
          <Card>
            <div className="text-sm font-medium mb-2">作息节律</div>
            <RhythmDots data={rhythm}/>
            <div className="text-xs text-ink-400 dark:text-ink-300 mt-2">● 上床 ◆ 起床 — 散点越聚拢，节律越稳定。</div>
          </Card>
          {state.insights.length>0 && (
            <Card>
              <div className="text-sm font-medium mb-3">本周洞察</div>
              <ul className="space-y-2">
                {state.insights.slice(-5).map(i => (
                  <li key={i.insightId} className="text-sm text-ink-700 dark:text-ink-100 leading-relaxed">· {i.message}</li>
                ))}
              </ul>
            </Card>
          )}
        </>
      )}
    </div>
  );
}

function PlanPage(){

  if (!active){
    return (
      <div className="px-5 pt-10 pb-12 space-y-5">
        <header>
          <h1 className="text-2xl font-medium">21 天计划</h1>
          <p className="text-sm text-ink-500 dark:text-ink-300 mt-1">一次只调整一件小事，循序渐进。</p>
        </header>
        <Card className="space-y-3">
          <div className="text-base font-medium">基础睡眠改善计划（21 天）</div>
          <div className="text-sm text-ink-500 dark:text-ink-300 leading-relaxed">
            第 1 周：建立固定起床时间。<br/>
            第 2 周：刺激控制 — 让大脑重新把床和睡眠联系起来。<br/>
            第 3 周：睡眠卫生与睡前放松。
          </div>
          <Button block onClick={()=>{
            const { plan, tasks } = createPlan(profile.userId);
            setPlan(plan, tasks);
          }}>加入这个计划</Button>
        </Card>
      </div>
    );
  }

  const dayIndex = planDayIndex(active);
  const tasks = state.planTasks;
  const tasksByDay = new Map();
  tasks.forEach(t => {
    if (!tasksByDay.has(t.dayIndex)) tasksByDay.set(t.dayIndex, []);
    tasksByDay.get(t.dayIndex).push(t);
  });
  const todayTasks = tasksByDay.get(dayIndex) || [];
  const weekIdx = Math.min(2, Math.floor((dayIndex-1)/7));
  const weekFocus = active.weeklyFocus[weekIdx];
  const doneCount = tasks.filter(t=>t.done).length;

  return (
    <div className="px-5 pt-10 pb-12 space-y-5">
      <header>
        <h1 className="text-2xl font-medium">21 天计划</h1>
        <div className="text-sm text-ink-500 dark:text-ink-300 mt-1">第 {dayIndex} 天 · 本周主题：{weekFocus}</div>

      <Card>
        <div className="flex items-center justify-between">
          <div>
            <div className="text-xs text-ink-400">已完成</div>
            <div className="text-2xl font-medium mt-1">{doneCount}<span className="text-sm text-ink-400"> / 21</span></div>
          </div>
          <div className="text-sm text-ink-500 dark:text-ink-300">一次专注一件小事即可</div>
        </div>
        <div className="mt-3 h-1.5 bg-ink-100 dark:bg-ink-700 rounded-full">
          <div className="h-1.5 bg-moon-400 dark:bg-moon-300 rounded-full" style={{width:`${(doneCount/21)*100}%`}}/>
        </div>
      </Card>

      <section className="space-y-3">
        <div className="text-sm font-medium text-ink-500 dark:text-ink-300 px-1">今天的微任务</div>
        {todayTasks.length===0 ? (
          <Card className="text-ink-400 text-center py-8">今天没有特别安排，给自己一些喘息的空间也很好。</Card>
        ) : todayTasks.map(t => (
          <button key={t.taskId} onClick={()=>toggleTask(t.taskId)} className="w-full text-left">
            <Card className={cls("transition", t.done && "bg-moon-50 dark:bg-moon-700/30")}>
              <div className="flex items-start gap-3">
                <div className={cls("mt-0.5 w-5 h-5 rounded-full border-2 flex-shrink-0 flex items-center justify-center",
                  t.done ? "bg-score-high border-score-high text-white" : "border-ink-300 dark:border-ink-600")}>
                  {t.done && <span className="text-xs">✓</span>}
                </div>
                <div>
                  <div className={cls("font-medium", t.done && "text-ink-400 line-through")}>{t.title}</div>
                  <div className="text-sm text-ink-500 dark:text-ink-300 mt-1 leading-relaxed">{t.description}</div>
                </div>
              </div>
            </Card>
          </button>
        ))}
      </section>

      <Card>
        <div className="text-sm font-medium mb-3">21 天概览</div>
        <div className="grid grid-cols-7 gap-1.5">
          {Array.from({length:21}, (_,i)=>i+1).map(d => {
            const dt = tasksByDay.get(d) || [];
            const done = dt.length>0 && dt.every(t=>t.done);
            const isToday = d===dayIndex;
            return (
              <div key={d} className={cls("aspect-square rounded-md flex items-center justify-center text-xs",
                isToday && "ring-2 ring-moon-400",
                done ? "bg-score-high text-white"
                     : d<=dayIndex ? "bg-moon-50 text-moon-700 dark:bg-moon-700/30 dark:text-moon-100"
                                   : "bg-ink-100 text-ink-400 dark:bg-ink-700 dark:text-ink-300")}>
                {d}
              </div>
            );
          })}
        </div>
      </Card>
    </div>
  );
}

function BreathingPage({ methodId, onBack }){
  const { state, addPractice } = useStore();
  const method = useMemo(()=>findMethod(methodId), [methodId]);
  const targetSec = method.defaultMin * 60;
  const [running, setRunning] = useState(false);
  const [completed, setCompleted] = useState(false);
  const [elapsed, setElapsed] = useState(0);
  const startedAtRef = useRef(null);

  useEffect(() => {
    if (!running) return;
    const i = setInterval(()=>setElapsed(s=>s+1), 1000);
    return ()=>clearInterval(i);
  }, [running]);

  useEffect(() => {
    if (running && elapsed >= targetSec && !completed){
      setCompleted(true); setRunning(false);
      if (startedAtRef.current){
        addPractice({
          sessionId: uid(), userId: state.profile.userId, type:"breathing", contentId:method.id,
          startedAt: new Date(startedAtRef.current).toISOString(),
          durationSec: elapsed, completed:true
        });
      }
    }
  }, [running, elapsed, completed, method, targetSec]);

  useEffect(() => { setRunning(false); setCompleted(false); setElapsed(0); startedAtRef.current = null; }, [method.id]);

  const start = () => { setRunning(true); setCompleted(false); setElapsed(0); startedAtRef.current = Date.now(); };
  const stop = () => {
    setRunning(false);
    if (startedAtRef.current && elapsed>30){
      addPractice({
        sessionId: uid(), userId: state.profile.userId, type:"breathing", contentId:method.id,
        startedAt: new Date(startedAtRef.current).toISOString(),
        durationSec: elapsed, completed:false
      });
    }
    onBack();
  };

  if (completed){
    return (
      <div className="min-h-dvh px-6 flex flex-col items-center justify-center text-center space-y-6">
        <div className="text-5xl">🌙</div>
        <h1 className="text-2xl font-medium">今晚也辛苦了</h1>
        <p className="text-base text-ink-500 dark:text-ink-200 leading-relaxed max-w-xs">
          身体已经慢下来了。如果还有点清醒，可以再做几轮，或者直接闭上眼睛。
        </p>
        <div className="space-y-2 w-full max-w-xs">
          <Button block onClick={start}>再做 {method.defaultMin} 分钟</Button>
          <Button block variant="ghost" onClick={onBack}>回首页</Button>
        </div>
      </div>
    );
  }

  if (!running){
    return (
      <div className="min-h-dvh px-6 flex flex-col items-center justify-center text-center space-y-6">
        <div className="text-sm text-ink-400">{method.title}</div>
        <h1 className="text-2xl font-medium">找一个舒服的姿势</h1>
        <p className="text-base text-ink-500 dark:text-ink-200 leading-relaxed max-w-xs">
          {method.desc}
        </p>
        <div className="space-y-2 w-full max-w-xs">
          <Button block size="lg" onClick={start}>开始 {method.defaultMin} 分钟</Button>
          <Button block variant="ghost" onClick={onBack}>返回</Button>
        </div>
      </div>
    );
  }

  const remaining = Math.max(0, targetSec - elapsed);
  const mm = pad(Math.floor(remaining/60));
  const ss = pad(remaining%60);

  return (
    <div className="min-h-dvh px-6 flex flex-col items-center justify-between py-12">
      <div className="text-sm text-ink-400 dark:text-ink-300">{method.title} · 剩余 {mm}:{ss}</div>
      <BreathingOrb method={method} running={running}/>
      <Button variant="ghost" onClick={stop}>结束</Button>
    </div>
  );
}

const findStory = (id) => STORIES.find(s => s.id === id);

const ttsEngine = (() => {
  let currentStoryId = null, paragraphIdx = 0, paused = false;
  let gapTimer = null, voice = null, voicesReady = false, volume = 1.0;
  let currentOpts = {}, currentEngine = null, currentAudio = null, currentAudioRevoke = null;
  let loading = false, error = undefined;
  const listeners = new Set();

  const isSupported = () => typeof window !== "undefined" && "speechSynthesis" in window;

  const waitForVoices = () => new Promise(resolve => {
    if (!isSupported()) return resolve([]);
    if (voicesReady) return resolve(speechSynthesis.getVoices());
    const tryGet = () => { const v = speechSynthesis.getVoices(); if (v.length>0){voicesReady=true;resolve(v);} };
    tryGet();
    if (!voicesReady) {
      const h = () => { tryGet(); if (voicesReady) speechSynthesis.removeEventListener("voiceschanged", h); };
      speechSynthesis.addEventListener("voiceschanged", h);
      setTimeout(() => { voicesReady=true; resolve(speechSynthesis.getVoices()); }, 1500);
    }
  });

  const hasChineseVoice = async () => { const vs = await waitForVoices(); return vs.some(v=>/zh|cmn/i.test(v.lang)); };

  const pickVoice = async () => {
    if (voice) return voice;
    const vs = await waitForVoices();
    const scored = vs.filter(v=>/zh|cmn/i.test(v.lang)).map(v=>{
      let s=0;
      if (v.lang==="zh-CN") s+=100; else if (v.lang.startsWith("zh")) s+=50; else s+=10;
      if (/female|girl|woman/i.test(v.name)) s+=20;
      if (/tingting|mei-jia|sin-ji|yuna/i.test(v.name)) s+=30;
      s+=Math.min(v.name.length,15);
      return {voice:v,score:s};
    }).sort((a,b)=>b.score-a.score);
    voice = scored[0]?.voice||null;
    return voice;
  };

  const emit = () => listeners.forEach(fn=>fn({
    storyId: currentStoryId, paragraphIdx, paused,
    totalParagraphs: currentStoryId?(findStory(currentStoryId)?.paragraphs.length??0):0,
    engine: currentEngine, loading, error
  }));

  const synthesizeParagraph = async (proxyUrl, text, voiceName) => {
    const res = await fetch(proxyUrl, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ text, voice: voiceName, speed: 0.95 })
    });
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const j = await res.json(); if (j.message) msg = j.message; } catch {}
      const e = new Error(msg); e.status = res.status; throw e;
    }
    return res.arrayBuffer();
  };

  const speakCloud = async (text, totalParas) => {
    loading = true; error = undefined; emit();
    let buf;
    try {
      buf = await synthesizeParagraph(currentOpts.proxyUrl, text, currentOpts.voice);
    } catch (e) {
      loading = false;
      error = e.status===503 ? "服务端未配置豆包凭证" : e.message;
      emit();
      currentEngine = "browser"; await pickVoice(); speakBrowser(text, totalParas);
      return;
    }
    if (paused||!currentStoryId){ loading=false; emit(); return; }
    loading = false; emit();
    const blob = new Blob([buf], { type:"audio/mpeg" });
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    audio.volume = volume;
    currentAudio = audio;
    currentAudioRevoke = () => URL.revokeObjectURL(url);
    audio.onended = () => {
      currentAudioRevoke?.(); currentAudioRevoke = null;
      if (paused||!currentStoryId) return;
      paragraphIdx+=1; emit();
      if (paragraphIdx>=totalParas){ stop(); return; }
      gapTimer = setTimeout(()=>{ if(!paused) speakParagraph(); }, 1400);
    };
    audio.onerror = () => stop();
    try { await audio.play(); } catch { stop(); }
  };

  const speakBrowser = (text, totalParas) => {
    if(!isSupported()){stop();return;}
    const u = new SpeechSynthesisUtterance(text);
    u.lang="zh-CN"; if(voice)u.voice=voice; u.rate=1.0; u.pitch=1.0; u.volume=volume;
    u.onend = () => {
      if (paused||!currentStoryId) return;
      paragraphIdx+=1; emit();
      if (paragraphIdx>=totalParas){stop();return;}
      gapTimer = setTimeout(()=>{if(!paused)speakParagraph();}, 1400);
    };
    u.onerror = () => stop();
    try{speechSynthesis.speak(u);}catch{stop();}
  };

  const speakParagraph = async () => {
    if (paused||!currentStoryId) return;
    const story = findStory(currentStoryId); if (!story){stop();return;}
    const text = story.paragraphs[paragraphIdx]; if (text==null){stop();return;}
    if (currentEngine === "cloud" && currentOpts.proxyUrl) await speakCloud(text, story.paragraphs.length);
    else speakBrowser(text, story.paragraphs.length);
  };

  const start = async (id, opts={}) => {
    if(!isSupported() && !opts.proxyUrl) return;
    stop(); if(!findStory(id))return;
    currentStoryId=id; paragraphIdx=0; paused=false;
    currentOpts = opts;
    currentEngine = opts.proxyUrl ? "cloud" : "browser";
    error = undefined; emit();
    if (currentEngine === "browser") await pickVoice();
    await speakParagraph();
  };
  const pause = () => {
    if(!currentStoryId)return; paused=true;
    if (currentEngine === "cloud") { try{currentAudio?.pause();}catch{} }
    else { try{speechSynthesis.pause();}catch{} }
    if(gapTimer){clearTimeout(gapTimer);gapTimer=null;} emit();
  };
  const resume = () => {
    if(!currentStoryId)return; paused=false;
    if (currentEngine === "cloud" && currentAudio) { currentAudio.play().catch(()=>{}); }
    else if (isSupported() && speechSynthesis.paused) { try{speechSynthesis.resume();}catch{} }
    else speakParagraph();
    emit();
  };
  const stop = () => {
    if(gapTimer){clearTimeout(gapTimer);gapTimer=null;}
    if (isSupported()) { try{speechSynthesis.cancel();}catch{} }
    if (currentAudio) { try{currentAudio.pause();}catch{} currentAudio = null; }
    if (currentAudioRevoke) { currentAudioRevoke(); currentAudioRevoke = null; }
    currentStoryId=null; paragraphIdx=0; paused=false; currentEngine=null; loading=false; error=undefined; emit();
  };

  return {
    isSupported, hasChineseVoice,
    subscribe: (fn) => { listeners.add(fn); return () => listeners.delete(fn); },
    getStatus: () => ({ storyId: currentStoryId, paragraphIdx, paused,
      totalParagraphs: currentStoryId?(findStory(currentStoryId)?.paragraphs.length??0):0,
      engine: currentEngine, loading, error }),
    start, pause, resume, stop,
    setVolume: (v) => { volume = Math.max(0,Math.min(1,v)); }
  };
})();

/* ============================================================
   音频引擎（端侧合成）
============================================================ */
const MAX_VOICES = 3;
const NOISE_DURATION_SEC = 10;
const FADE_MS = 800;
const TIMER_FADE_MS = 5000;

const SOUNDS_CATALOG = [
  { id:"rain", title:"夜雨", icon:"🌧️", category:"nature",
    desc:"细密均匀的雨声，最普适的入睡背景。" },
  { id:"ocean", title:"海浪", icon:"🌊", category:"nature",
    desc:"慢节奏的浪起浪落，跟着呼吸一起松下来。" },
  { id:"forest", title:"森林夜虫", icon:"🌲", category:"nature",
    desc:"高频空气感 + 偶尔虫鸣，像在野外帐篷里。" },
  { id:"fire", title:"篝火", icon:"🔥", category:"nature",
    desc:"低频燃烧声 + 偶尔噼啪爆破，温暖陪伴。" },
  { id:"fan", title:"风扇低鸣", icon:"💨", category:"white-noise",
    desc:"中频带通噪音，掩盖环境噪声的经典选择。" },
  { id:"white", title:"白噪音", icon:"▩", category:"white-noise",
    desc:"全频段平均能量，强遮蔽，适合嘈杂环境。" },
  { id:"pink", title:"粉噪音", icon:"◌", category:"white-noise",
    desc:"比白噪音更柔和，被研究认为对深睡眠更友好。" },
  { id:"brown", title:"棕噪音", icon:"●", category:"white-noise",
    desc:"低频为主，像远处的瀑布，最沉的一种。" }
];
const SOUND_CATEGORIES_LABEL = { "nature":"自然", "white-noise":"白噪音", "ambient":"环境" };
const TIMER_OPTIONS = [15, 30, 45, 60, 90];
const findSound = (id) => SOUNDS_CATALOG.find(s => s.id === id);

const audioEngine = (() => {
  let ctx = null, master = null;
  const noiseBuffers = {};
  const voices = new Map();

  const getCtx = () => {
    if (!ctx) { const Ctor = window.AudioContext||window.webkitAudioContext; if(!Ctor)return null; ctx=new Ctor(); }
    if(ctx.state==="suspended")ctx.resume(); return ctx;
  };
  const getMaster = () => { const c=getCtx();if(!c)return null; if(!master){master=c.createGain();master.gain.value=0.75;master.connect(c.destination);} return master; };

  const makeNoise = (type) => {
    if(noiseBuffers[type])return noiseBuffers[type];
    const c=getCtx();const sr=c.sampleRate;const buf=c.createBuffer(2,sr*NOISE_DURATION_SEC,sr);
    for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);
      if(type==="white"){for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;}
      else if(type==="pink"){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.969*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)*0.11;b6=w*0.115926;}}
      else{let last=0;for(let i=0;i<d.length;i++){const w=Math.random()*2-1;last=(last+0.02*w)/1.02;d[i]=last*3.5;}}
    }
    noiseBuffers[type]=buf; return buf;
  };
  const noiseSrc = (type) => { const c=getCtx();const s=c.createBufferSource();s.buffer=makeNoise(type);s.loop=true;s.start();return s; };

  const fadeTo = (g,target,ms) => {
    const c=getCtx();const t=c.currentTime;
    g.gain.cancelScheduledValues(t);g.gain.setValueAtTime(g.gain.value,t);
    g.gain.linearRampToValueAtTime(target,t+ms/1000);
  };

  // 柔化重写：所有声音末端 LP；不再用纯正弦；事件类柔化
  const buildVoice = (id) => {
    const c=getCtx();
    const out=c.createGain();out.gain.value=0;
    const inner=c.createGain();inner.gain.value=1;
    let stopAll=()=>{};

    if(id==="white"||id==="pink"||id==="brown"){
      const s=noiseSrc(id);
      const lp=c.createBiquadFilter();lp.type="lowpass";lp.Q.value=0.3;
      lp.frequency.value=id==="white"?6000:id==="pink"?5000:2000;
      const g=c.createGain();g.gain.value=id==="brown"?1.0:0.7;
      s.connect(g).connect(lp).connect(out);
      stopAll=()=>{try{s.stop();[g,lp].forEach(n=>n.disconnect());}catch{}};
    }
    else if(id==="rain"){
      const s1=noiseSrc("pink");const lp1=c.createBiquadFilter();lp1.type="lowpass";lp1.frequency.value=1200;lp1.Q.value=0.5;
      const g1=c.createGain();g1.gain.value=0.55;const pL=c.createStereoPanner();pL.pan.value=-0.15;
      s1.connect(lp1).connect(g1).connect(pL).connect(inner);
      const s2=noiseSrc("pink");const lp2=c.createBiquadFilter();lp2.type="lowpass";lp2.frequency.value=900;lp2.Q.value=0.4;
      const g2=c.createGain();g2.gain.value=0.4;const pR=c.createStereoPanner();pR.pan.value=0.15;
      s2.connect(lp2).connect(g2).connect(pR).connect(inner);
      const lfo=c.createOscillator();lfo.frequency.value=0.05;const lfoG=c.createGain();lfoG.gain.value=0.08;
      lfo.connect(lfoG).connect(g1.gain);lfo.start();
      const softLP=c.createBiquadFilter();softLP.type="lowpass";softLP.frequency.value=2000;softLP.Q.value=0.3;
      inner.connect(softLP).connect(out);
      stopAll=()=>{try{lfo.stop();s1.stop();s2.stop();[g1,g2,pL,pR,lp1,lp2,lfoG,softLP,inner].forEach(n=>n.disconnect());}catch{}};
    }
    else if(id==="ocean"){
      const s1=noiseSrc("brown");const lp1=c.createBiquadFilter();lp1.type="lowpass";lp1.frequency.value=500;lp1.Q.value=0.4;
      const gMain=c.createGain();gMain.gain.value=0.6;const pL=c.createStereoPanner();pL.pan.value=-0.1;
      s1.connect(lp1).connect(gMain).connect(pL).connect(inner);
      const s2=noiseSrc("pink");const lp2=c.createBiquadFilter();lp2.type="lowpass";lp2.frequency.value=1200;lp2.Q.value=0.4;
      const gFoam=c.createGain();gFoam.gain.value=0;const pR=c.createStereoPanner();pR.pan.value=0.1;
      s2.connect(lp2).connect(gFoam).connect(pR).connect(inner);
      const lfo=c.createOscillator();lfo.frequency.value=0.06;
      const lfoG1=c.createGain();lfoG1.gain.value=0.25;lfo.connect(lfoG1).connect(gMain.gain);
      const lfoG2=c.createGain();lfoG2.gain.value=0.18;lfo.connect(lfoG2).connect(gFoam.gain);
      lfo.start();
      const softLP=c.createBiquadFilter();softLP.type="lowpass";softLP.frequency.value=1800;softLP.Q.value=0.3;
      inner.connect(softLP).connect(out);
      stopAll=()=>{try{lfo.stop();s1.stop();s2.stop();[gMain,gFoam,pL,pR,lp1,lp2,lfoG1,lfoG2,softLP,inner].forEach(n=>n.disconnect());}catch{}};
    }
    else if(id==="fan"){
      const s1=noiseSrc("brown");const lp1=c.createBiquadFilter();lp1.type="lowpass";lp1.frequency.value=90;lp1.Q.value=0.6;
      const gSub=c.createGain();gSub.gain.value=0.7;s1.connect(lp1).connect(gSub).connect(inner);
      const s2=noiseSrc("pink");const lp2=c.createBiquadFilter();lp2.type="lowpass";lp2.frequency.value=700;lp2.Q.value=0.5;
      const gBody=c.createGain();gBody.gain.value=0.5;s2.connect(lp2).connect(gBody).connect(inner);
      const lfo=c.createOscillator();lfo.frequency.value=3;const lfoG=c.createGain();lfoG.gain.value=0.025;
      lfo.connect(lfoG).connect(gBody.gain);lfo.start();
      const softLP=c.createBiquadFilter();softLP.type="lowpass";softLP.frequency.value=1500;softLP.Q.value=0.3;
      inner.connect(softLP).connect(out);
      stopAll=()=>{try{lfo.stop();s1.stop();s2.stop();[gSub,gBody,lp1,lp2,lfoG,softLP,inner].forEach(n=>n.disconnect());}catch{}};
    }
    else if(id==="forest"){
      const s1=noiseSrc("pink");const bp=c.createBiquadFilter();bp.type="bandpass";bp.frequency.value=1500;bp.Q.value=0.5;
      const gW=c.createGain();gW.gain.value=0.45;const pL=c.createStereoPanner();pL.pan.value=-0.2;
      s1.connect(bp).connect(gW).connect(pL).connect(inner);
      const s2=noiseSrc("pink");const bp2=c.createBiquadFilter();bp2.type="bandpass";bp2.frequency.value=1100;bp2.Q.value=0.5;
      const gW2=c.createGain();gW2.gain.value=0.3;const pR=c.createStereoPanner();pR.pan.value=0.2;
      s2.connect(bp2).connect(gW2).connect(pR).connect(inner);
      const s3=noiseSrc("white");const bpC=c.createBiquadFilter();bpC.type="bandpass";bpC.frequency.value=2200;bpC.Q.value=18;
      const gC=c.createGain();gC.gain.value=0.12;s3.connect(bpC).connect(gC).connect(inner);
      const lfoC=c.createOscillator();lfoC.frequency.value=12;const lfoCG=c.createGain();lfoCG.gain.value=0.07;
      lfoC.connect(lfoCG).connect(gC.gain);lfoC.start();
      const softLP=c.createBiquadFilter();softLP.type="lowpass";softLP.frequency.value=2500;softLP.Q.value=0.3;
      inner.connect(softLP).connect(out);
      stopAll=()=>{try{lfoC.stop();s1.stop();s2.stop();s3.stop();[gW,gW2,gC,pL,pR,bp,bp2,bpC,lfoCG,softLP,inner].forEach(n=>n.disconnect());}catch{}};
    }
    else if(id==="fire"){
      const s1=noiseSrc("brown");const lp1=c.createBiquadFilter();lp1.type="lowpass";lp1.frequency.value=250;lp1.Q.value=0.4;
      const gLow=c.createGain();gLow.gain.value=0.7;s1.connect(lp1).connect(gLow).connect(inner);
      const s2=noiseSrc("pink");const lp2=c.createBiquadFilter();lp2.type="lowpass";lp2.frequency.value=800;lp2.Q.value=0.4;
      const gMid=c.createGain();gMid.gain.value=0.35;s2.connect(lp2).connect(gMid).connect(inner);
      const lfo=c.createOscillator();lfo.frequency.value=0.4;const lfoG=c.createGain();lfoG.gain.value=0.12;
      lfo.connect(lfoG).connect(gMid.gain);lfo.start();
      const timers=[];
      const crackle=()=>{const t=c.currentTime;const b=noiseSrc("white");const bp=c.createBiquadFilter();bp.type="bandpass";bp.frequency.value=600+Math.random()*600;bp.Q.value=3;const bg=c.createGain();const vol=0.04+Math.random()*0.05;bg.gain.setValueAtTime(0,t);bg.gain.linearRampToValueAtTime(vol,t+0.04);bg.gain.exponentialRampToValueAtTime(0.0001,t+0.25);b.connect(bp).connect(bg).connect(inner);b.stop(t+0.3);timers.push(setTimeout(crackle,800+Math.random()*2500));};
      crackle();
      const softLP=c.createBiquadFilter();softLP.type="lowpass";softLP.frequency.value=1500;softLP.Q.value=0.3;
      inner.connect(softLP).connect(out);
      stopAll=()=>{timers.forEach(clearTimeout);try{lfo.stop();s1.stop();s2.stop();[gLow,gMid,lp1,lp2,lfoG,softLP,inner].forEach(n=>n.disconnect());}catch{}};
    }

    return {id,gain:out,stopAll};
  };

  const stopVoice = (v,fadeMs) => {
    fadeTo(v.gain,0,fadeMs);
    setTimeout(()=>{try{v.stopAll();v.gain.disconnect();}catch{}},fadeMs+50);
  };

  return {
    isSupported:()=>!!(window.AudioContext||window.webkitAudioContext),
    ensureStarted:async()=>{const c=getCtx();if(c?.state==="suspended")await c.resume();getMaster();},
    play:(id,vol)=>{if(voices.has(id)){audioEngine.setVoiceVolume(id,vol);return;}const v=buildVoice(id);v.gain.connect(getMaster());fadeTo(v.gain,vol,FADE_MS);voices.set(id,v);},
    stop:(id)=>{const v=voices.get(id);if(!v)return;voices.delete(id);stopVoice(v,FADE_MS);},
    stopAll:(fadeMs)=>{const fm=fadeMs??TIMER_FADE_MS;Array.from(voices.keys()).forEach(id=>{const v=voices.get(id);voices.delete(id);stopVoice(v,fm);});},
    setVoiceVolume:(id,v)=>{const x=voices.get(id);if(x)fadeTo(x.gain,v,200);},
    setMasterVolume:(v)=>{const m=getMaster();if(m)fadeTo(m,v,200);},
    isPlaying:(id)=>voices.has(id)
  };
})();

/* 音频播放 React state */
const AudioCtx = createContext(null);
function AudioProvider({ children }){
  const [active, setActive] = useState([]);
  const [masterVolume, _setMaster] = useState(0.7);
  const [timerEndsAt, setTimerEndsAt] = useState(null);
  const [tts, setTts] = useState(ttsEngine.getStatus());
  const [ttsVolume, _setTtsVolume] = useState(1.0);

  useEffect(() => ttsEngine.subscribe(setTts), []);

  useEffect(() => {
    if (!timerEndsAt) return;
    const i = setInterval(() => {
      if (Date.now() >= timerEndsAt) {
        audioEngine.stopAll();
        ttsEngine.stop();
        setActive([]);
        setTimerEndsAt(null);
      }
    }, 1000);
    return () => clearInterval(i);
  }, [timerEndsAt]);

  const api = useMemo(() => ({
    active, masterVolume, timerEndsAt, tts, ttsVolume,
    toggle: async (id) => {
      await audioEngine.ensureStarted();
      setActive(prev => {
        const idx = prev.findIndex(v => v.id === id);
        if (idx >= 0) {
          audioEngine.stop(id);
          const next = prev.filter(v => v.id !== id);
          if (next.length === 0 && !ttsEngine.getStatus().storyId) setTimerEndsAt(null);
          return next;
        }
        let next = prev;
        if (next.length >= MAX_VOICES) {
          audioEngine.stop(next[0].id);
          next = next.slice(1);
        }
        audioEngine.play(id, 0.7);
        return [...next, { id, volume: 0.7 }];
      });
    },
    setVoiceVolume: (id, v) => {
      audioEngine.setVoiceVolume(id, v);
      setActive(prev => prev.map(a => a.id === id ? { ...a, volume: v } : a));
    },
    setMasterVolume: (v) => { audioEngine.setMasterVolume(v); _setMaster(v); },
    stopAll: () => { audioEngine.stopAll(); ttsEngine.stop(); setActive([]); setTimerEndsAt(null); },
    setTimer: (min) => setTimerEndsAt(min == null ? null : Date.now() + min*60*1000),
    toggleStory: async (id, opts) => {
      const cur = ttsEngine.getStatus();
      if (cur.storyId === id) { ttsEngine.stop(); return; }
      await ttsEngine.start(id, opts);
    },
    pauseStory: () => ttsEngine.pause(),
    resumeStory: () => ttsEngine.resume(),
    stopStory: () => ttsEngine.stop(),
    setStoryVolume: (v) => { ttsEngine.setVolume(v); _setTtsVolume(v); }
  }), [active, masterVolume, timerEndsAt, tts, ttsVolume]);

  return <AudioCtx.Provider value={api}>{children}</AudioCtx.Provider>;
}
const useAudio = () => useContext(AudioCtx);

const timerRemaining = (endsAt) => {
  const s = Math.max(0, Math.round((endsAt - Date.now())/1000));
  return `${pad(Math.floor(s/60))}:${pad(s%60)}`;
};

/* ============================================================
   Mini Player
============================================================ */
function MiniPlayer({ hideOn }){
  const a = useAudio();
  const [showTimer, setShowTimer] = useState(false);
  const [, setNow] = useState(Date.now());
  useEffect(() => {
    if (!a.timerEndsAt) return;
    const i = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(i);
  }, [a.timerEndsAt]);

  const story = findStory(a.tts.storyId);
  if (a.active.length === 0 && !story) return null;
  if (hideOn) return null;
  const titles = [
    ...a.active.map(v => findSound(v.id)?.title ?? v.id),
    ...(story ? [`📖 ${story.title}`] : [])
  ].join(" + ");

  return (
    <div className="fixed bottom-[72px] inset-x-0 z-30 px-3 pointer-events-none">
      <div className="max-w-md mx-auto pointer-events-auto">
        <div className="bg-[var(--card)] border border-[var(--line)] rounded-soft shadow-soft p-3 space-y-2">
          <div className="flex items-center gap-3">
            <div className="text-xl">♪</div>
            <div className="flex-1 min-w-0">
              <div className="text-sm font-medium truncate">{titles}</div>
              <div className="text-xs text-ink-400 dark:text-ink-300">
                {a.active.length > 0 && `${a.active.length} 轨`}
                {story && `${a.active.length > 0 ? " · " : ""}故事 ${a.tts.paragraphIdx+1}/${a.tts.totalParagraphs}${a.tts.paused ? "（已暂停）" : ""}`}
                {a.timerEndsAt && ` · 定时 ${timerRemaining(a.timerEndsAt)}`}
              </div>
            </div>
            {story && (
              <button onClick={()=>a.tts.paused ? a.resumeStory() : a.pauseStory()}
                className="px-3 py-1 rounded-pill text-xs bg-moon-500 text-white dark:bg-moon-300 dark:text-ink-900">
                {a.tts.paused ? "继续" : "暂停"}
              </button>
            )}
            <button onClick={()=>setShowTimer(v=>!v)}
              className={cls("px-3 py-1 rounded-pill text-xs",
                a.timerEndsAt ? "bg-amber-100 text-amber-500 dark:bg-amber-500/20 dark:text-amber-100"
                              : "bg-ink-100 text-ink-500 dark:bg-ink-700 dark:text-ink-200")}>⏱</button>
            <button onClick={()=>{ if(a.active.length>0) a.stopAll(); if(story) a.stopStory(); }}
              className="px-3 py-1 rounded-pill text-xs bg-ink-100 text-ink-500 dark:bg-ink-700 dark:text-ink-200">停止</button>
          </div>
          <div className="flex items-center gap-2">
            <span className="text-xs text-ink-400">音量</span>
            <input type="range" min={0} max={1} step={0.01} value={a.masterVolume}
              onChange={(e)=>a.setMasterVolume(Number(e.target.value))}
              className="flex-1 accent-moon-500 dark:accent-moon-300"/>
          </div>
          {showTimer && (
            <div className="pt-1 border-t border-ink-100 dark:border-ink-700 space-y-2">
              <div className="text-xs text-ink-500 dark:text-ink-300">定时关闭（最后 5 秒淡出）</div>
              <div className="grid grid-cols-5 gap-1.5">
                {TIMER_OPTIONS.map(v => (
                  <button key={v} onClick={()=>{ a.setTimer(v); setShowTimer(false); }}
                    className="px-2 py-1.5 rounded-md text-xs bg-ink-50 dark:bg-ink-700 hover:bg-moon-50 dark:hover:bg-moon-700/40">
                    {v} 分
                  </button>
                ))}
              </div>
              {a.timerEndsAt && (
                <button onClick={()=>{ a.setTimer(null); setShowTimer(false); }}
                  className="w-full text-xs text-ink-400 dark:text-ink-300 py-1">
                  取消定时（剩余 {timerRemaining(a.timerEndsAt)}）
                </button>
              )}
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function pickRecommended(diary){
  if (!diary) return "rain";
  const m = diary.moodTags || [];
  if (m.includes("anxious") || m.includes("stressed")) return "rain";
  if (diary.wakeCount >= 2) return "brown";
  if (m.includes("low")) return "fire";
  if (diary.subjectiveQuality <= 2) return "ocean";
  return "pink";
}

    if (!ttsEngine.isSupported()) { setTtsSupported(false); return; }
    ttsEngine.hasChineseVoice().then(setTtsSupported);
  }, []);
  const lastDiary = useMemo(() => {
    if (state.diaries.length === 0) return null;
    return [...state.diaries].sort((a,b)=>b.date.localeCompare(a.date))[0];

      {state.recentSounds.length > 0 && (

              </button>
            ))}
          </div>
        </section>
      )}

      <div className="flex gap-2 overflow-x-auto -mx-1 px-1 pb-1">

      <p>应用中的所有建议、洞察、计划，均基于公开的睡眠卫生原则与认知行为疗法（CBT-I）思路整理，仅作为生活方式参考，不能替代医生、临床心理师或睡眠专科的诊疗。</p>
      <p>如果你出现以下情况之一，请尽快前往医院睡眠科 / 精神心理科或专业医师就诊：</p>
      <ul className="list-disc pl-5 space-y-1.5">
        <li>持续 3 个月以上的失眠，并伴随严重日间功能损害</li>
        <li>严重情绪低落、持续焦虑或自伤念头</li>
        <li>打鼾伴随憋醒、白天严重嗜睡（疑似睡眠呼吸暂停）</li>
        <li>已经使用助眠药物且需要调整方案</li>
        <li>怀孕、哺乳期或患有其他慢性疾病期间</li>
      </ul>
      <p>本应用<strong>不会</strong>为你输出诊断结论，也不会就处方药、剂量、停药等给出指导。</p>
      <p className="text-sm text-ink-400 dark:text-ink-300 pt-4">最后更新：2026-05-10</p>
    </article>
  );
}

/* ============================================================
   BottomNav
============================================================ */
const TABS = [
  { id:"home", label:"首页", icon:"🌙" },
  { id:"sounds", label:"助眠", icon:"♪" },
  { id:"practice", label:"训练", icon:"✿" },
  { id:"plan", label:"计划", icon:"▦" },
  { id:"me", label:"我的", icon:"◐" }
];
function BottomNav({ active, onNav }){
  return (
    <nav className="fixed bottom-0 inset-x-0 z-40 bg-[var(--card)] border-t border-[var(--line)]">
      <ul className="max-w-md mx-auto grid grid-cols-5 px-2 pt-2 pb-[max(0.5rem,env(safe-area-inset-bottom))]">
        {TABS.map(t => {
          const a = active===t.id || (t.id==="home" && (active==="reports"||active==="diary"||active==="diary-new"));
          return (
            <li key={t.id}>
              <button onClick={()=>onNav(t.id)} className={cls(
                "w-full flex flex-col items-center justify-center py-1.5 rounded-lg transition",
                a ? "text-moon-600 dark:text-moon-200" : "text-ink-400 dark:text-ink-300"
              )}>
                <span className="text-xl leading-none">{t.icon}</span>
                <span className="text-[11px] mt-0.5">{t.label}</span>
              </button>
            </li>
          );
        })}
      </ul>
    </nav>
  );
}

/* ============================================================
   App Shell
============================================================ */
function AppRouter(){
  const { state } = useStore();
  const [view, setView] = useState("home");
  const [breathMethodId, setBreathMethodId] = useState("478");
  const profile = state.profile;
  const showNav = !["onboarding","breathing"].includes(view);
  const hideMiniPlayer = view === "breathing" || !profile || !profile.disclaimerAcceptedAt;

  if (!profile || !profile.disclaimerAcceptedAt){
    return <Onboarding onDone={()=>setView("home")}/>;
  }

  const chooseBreath = (id) => { setBreathMethodId(id); setView("breathing"); };

  let page;
  switch (view){
    case "home": page = <HomePage onNav={setView} onChooseBreath={chooseBreath}/>; break;
    case "diary": page = <DiaryListPage onNav={setView}/>; break;
    case "diary-new": page = <DiaryNewPage onDone={()=>setView("reports")}/>; break;
    case "reports": page = <ReportsPage/>; break;
    case "plan": page = <PlanPage/>; break;
    case "practice": page = <PracticePage onNav={setView} onChooseBreath={chooseBreath}/>; break;
    case "breathing": page = <BreathingPage methodId={breathMethodId} onBack={()=>setView("practice")}/>; break;
    case "worry": page = <WorryPage onBack={()=>setView("practice")}/>; break;
    case "reframe": page = <ReframePage onBack={()=>setView("practice")}/>; break;
    case "sounds": page = <SoundsPage/>; break;
    case "me": page = <MePage onNav={setView}/>; break;
    case "settings": page = <SettingsPage onNav={setView}/>; break;
    case "legal-disclaimer": page = <LegalPage which="disclaimer"/>; break;
    case "legal-privacy": page = <LegalPage which="privacy"/>; break;
    default: page = <HomePage onNav={setView}/>;
  }

  return (
    <div className="min-h-dvh max-w-md mx-auto pb-24">
      <main>{page}</main>
      <MiniPlayer hideOn={hideMiniPlayer}/>
      {showNav && <BottomNav active={view} onNav={setView}/>}
    </div>
  );
}

function App(){
  return (
    <StoreProvider>
      <ThemeManager/>
      <AudioProvider>
        <AppRouter/>
      </AudioProvider>
    </StoreProvider>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
document.getElementById("boot")?.remove();
  </script>
</body>
</html>
